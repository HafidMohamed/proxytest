# /etc/nginx/nginx.conf
# Translation Proxy – main Nginx configuration
# Optimised for Cloudflare-fronted reverse-proxy workloads.

user www-data;
worker_processes auto;           # one worker per CPU core
worker_rlimit_nofile 65535;      # raise open-file limit per worker

pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 4096;
    multi_accept       on;
    use                epoll;    # most efficient I/O model on Linux
}

http {
    # ── MIME / charset ────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset      utf-8;

    # ── Logging ───────────────────────────────────────────────────────────────
    # Logs real visitor IP (unwrapped from CF-Connecting-IP by set_real_ip_from)
    log_format main '$remote_addr [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time '
                    'cf_ray=$http_cf_ray country=$http_cf_ipcountry';

    access_log /var/log/nginx/access.log main buffer=64k flush=5s;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;

    # ── Buffers ───────────────────────────────────────────────────────────────
    client_body_buffer_size     128k;
    client_max_body_size        100m;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 16k;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── WebSocket upgrade map ─────────────────────────────────────────────────
    # Used in proxy configs: proxy_set_header Connection $connection_upgrade;
    map $http_upgrade $connection_upgrade {
        default   upgrade;
        ""        close;
    }

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Keyed on real visitor IP (post-Cloudflare unwrap)
    limit_req_zone  $remote_addr zone=global:20m rate=100r/s;
    limit_conn_zone $remote_addr zone=conn_limit:10m;

    # ── Security ──────────────────────────────────────────────────────────────
    server_tokens off;

    # ── Server name hashing (needed for 1000+ domains) ───────────────────────
    server_names_hash_max_size    65536;
    server_names_hash_bucket_size 128;

    # ── Cloudflare real-IP unwrapping (global) ────────────────────────────────
    # Loaded here so $remote_addr is the real visitor IP in ALL vhosts,
    # including the default_server block below.
    include /etc/nginx/snippets/cloudflare-realip.conf;

    # ── Default server – rejects ALL non-customer traffic ─────────────────────
    # Any TLS connection for a domain we don't manage hits this block.
    # It uses a self-signed placeholder cert so nginx starts even before
    # any customer cert has been issued.
    #
    # The `include cloudflare-allow.conf` here means:
    #   - Non-Cloudflare IPs hitting port 443 with an unknown SNI → 444 (drop)
    #   - Cloudflare IPs hitting port 443 with an unknown SNI → 444 (drop)
    # Either way, the origin server IP is never revealed in a useful response.
    # ── Default HTTP server (port 80) ────────────────────────────────────────
    # MUST serve ACME challenge for Let's Encrypt certificate issuance.
    # Port 80 is open to ALL IPs - LE validators are NOT Cloudflare IPs.
    # Only serves /.well-known/acme-challenge/ - everything else → 444.
    server {
        listen 80 default_server;
        server_name _;

        # ACME HTTP-01 challenge - used by certbot to issue/renew certs
        location /.well-known/acme-challenge/ {
            root /var/www/acme-challenge;
            try_files $uri =404;
            allow all;
        }

        # Drop everything else on port 80
        location / {
            return 444;
        }
    }

    # ── Default HTTPS server (port 443) ──────────────────────────────────────
    # Drops unknown domains silently. CF-only via UFW at kernel level.
    server {
        listen 443 default_server ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/default.crt;
        ssl_certificate_key /etc/nginx/ssl/default.key;

        # Silent drop for unknown domains
        return 444;
    }

    # ── Per-customer vhosts ───────────────────────────────────────────────────
    include /etc/nginx/sites-enabled/*.conf;
}
