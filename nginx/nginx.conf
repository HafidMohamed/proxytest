# /etc/nginx/nginx.conf
# Translation Proxy – Nginx main configuration
# Optimised for high-throughput reverse-proxy workloads.

user www-data;

# One worker per CPU core. "auto" reads the CPU count at startup.
worker_processes auto;

# Maximum open file descriptors per worker.
# Set this high to avoid "too many open files" under load.
# Also run:  ulimit -n 65535  (or set in systemd override)
worker_rlimit_nofile 65535;

pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

include /etc/nginx/modules-enabled/*.conf;

events {
    # Maximum simultaneous connections per worker.
    # Total theoretical max = worker_processes × worker_connections.
    worker_connections 4096;

    # Accept as many connections as possible in a single call.
    multi_accept on;

    # Use the most efficient I/O method available on Linux.
    use epoll;
}

http {
    # ── MIME / charset ────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    charset utf-8;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=64k flush=5s;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;

    # ── Buffers ───────────────────────────────────────────────────────────────
    client_body_buffer_size    128k;
    client_max_body_size       50m;
    client_header_buffer_size  4k;
    large_client_header_buffers 4 16k;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/rss+xml
                      application/atom+xml image/svg+xml;

    # ── Rate limiting (global) ────────────────────────────────────────────────
    # Each real IP is allowed 100 r/s with a burst of 200.
    limit_req_zone $binary_remote_addr zone=global:20m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Security ──────────────────────────────────────────────────────────────
    server_tokens off;

    # ── Default server – rejects unknown domains ──────────────────────────────
    # Any TLS connection for a domain we don't have a config for will hit
    # this block and receive a 444 (connection closed without response).
    server {
        listen 80  default_server;
        listen 443 default_server ssl;
        http2 on;

        server_name _;

        # Self-signed placeholder cert so nginx starts even before any real
        # customer certs are issued.  setup.sh generates this cert.
        ssl_certificate     /etc/nginx/ssl/default.crt;
        ssl_certificate_key /etc/nginx/ssl/default.key;

        return 444;   # Close connection silently
    }

    # ── Per-customer configs ──────────────────────────────────────────────────
    include /etc/nginx/sites-enabled/*.conf;
}
